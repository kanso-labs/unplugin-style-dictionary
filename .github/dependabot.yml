version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: 'npm'
    directory: '/'
    versioning-strategy: 'increase'
    schedule:
      interval: 'daily'
    groups:
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-plugin-*'
          - 'eslint-config-*'
          - 'typescript-eslint'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
