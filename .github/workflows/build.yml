name: Build

on: pull_request

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version-file: '.tool-versions'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
